<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>WhatIsItWorth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
:root{--a:#39ff6e;--a2:#00c8ff;--am:#ff9900;--vt:#09b687;--bg:#0a0a0f;--sf:rgba(12,12,20,0.95);--br:rgba(255,255,255,0.07);--tx:#f0f0f0;--mu:#555;--re:#ff4545;--fn:'DM Mono','Courier New',monospace;--hd:'Space Grotesk',sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--fn)}
/* LOADER */
#loader{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ll{font-family:var(--hd);font-size:clamp(20px,6vw,32px);font-weight:800;letter-spacing:-1px}
.ll em{color:var(--a);font-style:normal}
.lb-w{width:180px;height:2px;background:var(--br);border-radius:2px;overflow:hidden}
.lb{height:100%;width:0%;background:linear-gradient(90deg,var(--a),var(--a2));transition:width .35s ease}
.lt{font-size:10px;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
/* PERM */
#perm{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:30px;text-align:center}
.pi{font-size:54px}.pt{font-family:var(--hd);font-size:22px;font-weight:800}
.ps{font-size:13px;color:var(--mu);line-height:1.6;max-width:280px}
.bk{margin-top:6px;background:var(--a);color:#000;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-family:var(--fn);cursor:pointer;width:100%;max-width:280px;transition:opacity .2s}
.bk:active{opacity:.8}
/* BANNER */
#sb{display:none;position:fixed;top:0;left:0;right:0;z-index:100;background:var(--re);color:#fff;padding:8px 14px;font-size:11px;text-align:center;line-height:1.5}
#sb a{color:#fff;font-weight:500}
/* CAMERA */
#cw{position:fixed;inset:0}
#video{width:100%;height:100%;object-fit:cover}
#canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
/* HEADER */
.hdr{position:absolute;top:0;left:0;right:0;padding:env(safe-area-inset-top,40px) 16px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);display:flex;justify-content:space-between;align-items:center;z-index:10;gap:10px}
.logo{font-family:var(--hd);font-size:16px;font-weight:800;letter-spacing:-.5px;white-space:nowrap}
.logo em{color:var(--a);font-style:normal}
.hdr-btns{display:flex;gap:8px;align-items:center}
.ico-btn{width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(12px);border:1px solid var(--br);color:var(--tx);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;flex-shrink:0}
.ico-btn:active{transform:scale(.9)}
.pill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.4);backdrop-filter:blur(12px);border:1px solid var(--br);border-radius:20px;padding:5px 10px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;background:var(--a);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* SCAN LINE */
.sl{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--a),transparent);animation:sd 2.5s linear infinite;z-index:5;pointer-events:none;opacity:.55}
@keyframes sd{0%{top:0%;opacity:0}5%{opacity:.55}95%{opacity:.55}100%{top:100%;opacity:0}}
/* SEARCH OVERLAY */
#search-overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:flex-end}
#search-overlay.open{display:flex}
.search-box{width:100%;background:var(--sf);border-radius:22px 22px 0 0;border-top:1px solid var(--br);padding:20px 18px env(safe-area-inset-bottom,20px)}
.search-title{font-family:var(--hd);font-size:18px;font-weight:800;margin-bottom:14px}
.search-row{display:flex;gap:8px}
#search-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--br);border-radius:11px;padding:12px 14px;color:var(--tx);font-size:15px;font-family:var(--fn);outline:none}
#search-input:focus{border-color:var(--a)}
#search-input::placeholder{color:var(--mu)}
.search-btn{background:var(--a);color:#000;border:none;border-radius:11px;padding:12px 18px;font-size:14px;font-family:var(--fn);cursor:pointer;white-space:nowrap;transition:opacity .2s}
.search-btn:active{opacity:.8}
.search-cancel{margin-top:10px;width:100%;background:none;border:none;color:var(--mu);font-size:13px;font-family:var(--fn);cursor:pointer;padding:8px}
/* PRICE CARD */
#pc{position:absolute;bottom:0;left:0;right:0;background:var(--sf);backdrop-filter:blur(26px) saturate(1.5);-webkit-backdrop-filter:blur(26px) saturate(1.5);border-top:1px solid var(--br);border-radius:22px 22px 0 0;padding:0 16px env(safe-area-inset-bottom,14px);z-index:20;transform:translateY(110%);transition:transform .45s cubic-bezier(.34,1.4,.64,1);max-height:82vh;overflow-y:auto;scrollbar-width:none}
#pc::-webkit-scrollbar{display:none}
#pc.up{transform:translateY(0)}
.hdl{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:12px auto 14px}
.on{font-family:var(--hd);font-size:22px;font-weight:800;text-transform:capitalize;margin-bottom:2px}
.os{font-size:11px;color:var(--mu);letter-spacing:.3px;margin-bottom:14px}
/* PRICE GRID */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.pb{background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:10px;padding:10px 5px;text-align:center}
.pl{font-size:9px;color:var(--mu);letter-spacing:.7px;text-transform:uppercase;margin-bottom:3px}
.pv{font-size:18px;font-weight:500}
.pv.g{color:var(--a)}.pv.w{color:var(--tx)}.pv.b{color:var(--a2)}.pv.o{color:var(--am)}
/* SOURCE BADGE */
.sb2{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:var(--mu);background:rgba(255,255,255,.04);border:1px solid var(--br);border-radius:5px;padding:3px 7px;margin-bottom:10px}
/* LISTINGS */
.lsts{margin-bottom:12px}
.lst{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--br);gap:10px}
.lst:last-child{border-bottom:none}
.ltl{font-size:11px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.lpr{font-size:12px;font-weight:500;white-space:nowrap}
.lpr.green{color:var(--a)}.lpr.orange{color:var(--am)}
/* VINTED BLOCK */
.vb{background:rgba(9,182,135,.07);border:1px solid rgba(9,182,135,.2);border-radius:10px;padding:11px;margin-bottom:11px}
.vh{display:flex;align-items:center;gap:6px;margin-bottom:9px}
.vn{font-size:11px;font-weight:500;color:var(--vt)}
.vc{font-size:10px;color:var(--mu);margin-left:auto}
.vg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.vx{text-align:center}
.vxl{font-size:9px;color:var(--mu);letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px}
.vxv{font-size:15px;font-weight:500;color:var(--vt)}.vxv.vw{color:var(--tx)}.vxv.vb2{color:var(--a2)}
/* AMAZON BLOCK */
.amb{background:rgba(255,153,0,.07);border:1px solid rgba(255,153,0,.2);border-radius:10px;padding:11px;margin-bottom:11px}
.amh{display:flex;align-items:center;gap:6px;margin-bottom:9px}
.amn{font-size:11px;font-weight:500;color:var(--am)}
.amc{font-size:10px;color:var(--mu);margin-left:auto}
.amg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.amx{text-align:center}
.amxl{font-size:9px;color:var(--mu);letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px}
.amxv{font-size:15px;font-weight:500;color:var(--am)}.amxv.amw{color:var(--tx)}.amxv.amb2{color:var(--a2)}
/* PLATFORM GRID */
.stl{font-size:10px;color:var(--mu);letter-spacing:.7px;text-transform:uppercase;margin-bottom:9px}
.plts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.plt{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:10px;padding:9px 3px;text-decoration:none;color:var(--tx);font-size:9px;text-align:center;transition:all .15s;cursor:pointer}
.plt:active{transform:scale(.93);background:rgba(255,255,255,.07)}
.plt .ic{font-size:19px}
.plt .nm{color:var(--mu);font-size:9px}
/* CTA */
.cta{display:block;width:100%;background:linear-gradient(135deg,var(--a),var(--a2));color:#000;text-align:center;padding:13px;border-radius:10px;font-size:13px;font-weight:500;text-decoration:none;border:none;cursor:pointer;margin-bottom:8px;font-family:var(--fn);transition:opacity .2s}
.cta:active{opacity:.85}
/* STATES */
.ld{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--mu);padding:16px 0}
.sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.nr{font-size:12px;color:var(--mu);padding:8px 0;line-height:1.5}
/* HISTORY */
#hp{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;padding:env(safe-area-inset-top,46px) 16px 16px}
#hp.open{display:flex}
.hph{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.hpt{font-family:var(--hd);font-size:20px;font-weight:800}
.xcb{background:none;border:none;color:var(--tx);font-size:20px;cursor:pointer;padding:4px}
.hpl{flex:1;overflow-y:auto;scrollbar-width:none}
.hpl::-webkit-scrollbar{display:none}
.hi{display:flex;justify-content:space-between;align-items:center;padding:12px 10px;background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:10px;margin-bottom:6px}
.hn{font-size:13px;font-weight:500;text-transform:capitalize;margin-bottom:2px}
.hd2{font-size:10px;color:var(--mu)}
.ha{font-size:16px;font-weight:500;color:var(--a)}
.he{text-align:center;color:var(--mu);font-size:12px;margin-top:50px;line-height:2}
/* TOAST */
#toast{position:fixed;top:86px;left:50%;transform:translateX(-50%) translateY(-6px);background:rgba(18,18,28,.96);border:1px solid var(--br);backdrop-filter:blur(12px);border-radius:9px;padding:9px 15px;font-size:12px;z-index:300;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loader">
  <div class="ll">WhatIsIt<em>Worth</em></div>
  <div class="lb-w"><div class="lb" id="lbar"></div></div>
  <div class="lt" id="ltxt">Démarrage…</div>
</div>

<div id="perm">
  <div class="pi">📷</div>
  <div class="pt">Accès caméra requis</div>
  <div class="ps">WhatIsItWorth a besoin de ta caméra pour détecter les objets et estimer leur valeur.</div>
  <button class="bk" onclick="requestCamera()">Autoriser la caméra</button>
</div>

<div id="sb">⚠️ <strong>App ID eBay manquant.</strong> Compte gratuit sur <a href="https://developer.ebay.com" target="_blank">developer.ebay.com</a> → remplace VOTRE_APP_ID_ICI</div>

<div id="cw">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>
  <div class="sl"></div>
  <header class="hdr">
    <div class="logo">WhatIsIt<em>Worth</em></div>
    <div class="hdr-btns">
      <button class="ico-btn" onclick="openSearch()" title="Recherche manuelle">🔍</button>
      <button class="ico-btn" onclick="openHistory()" title="Historique">📋</button>
      <div class="pill"><div class="dot"></div>Live</div>
    </div>
  </header>
  <div id="pc">
    <div class="hdl"></div>
    <div id="cb"></div>
  </div>
</div>

<!-- SEARCH OVERLAY -->
<div id="search-overlay" onclick="handleOverlayClick(event)">
  <div class="search-box">
    <div class="search-title">🔍 Recherche manuelle</div>
    <div class="search-row">
      <input id="search-input" type="text" placeholder="Ex: iPhone 13, vélo VTT, PS5…" autocomplete="off" autocorrect="off"/>
      <button class="search-btn" onclick="doManualSearch()">Chercher</button>
    </div>
    <button class="search-cancel" onclick="closeSearch()">Annuler</button>
  </div>
</div>

<div id="hp">
  <div class="hph">
    <div class="hpt">Historique</div>
    <button class="xcb" onclick="closeHistory()">✕</button>
  </div>
  <div class="hpl" id="hpl"></div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
/* ═══════════════════════════════════════════
   CONFIG — Remplace par ton App ID eBay GRATUIT
   → https://developer.ebay.com → My Account → Keys
═══════════════════════════════════════════ */
const EBAY_APP_ID = 'LucasWep-MoodMeal-PRD-96c21b7a2-16c4f33b';
const EBAY_GLOBAL = 'EBAY-FR';
const DETECT_MS   = 2200;
const MIN_SCORE   = 0.50;

/* ── TRADUCTIONS + TERMES DE RECHERCHE OPTIMISÉS ── */
const FR = {
  /* Véhicules */
  'bicycle':'vélo','car':'voiture','motorcycle':'moto','airplane':'avion',
  'bus':'bus','train':'train','truck':'camion','boat':'bateau',
  /* Accessoires & bagages */
  'backpack':'sac à dos','umbrella':'parapluie','handbag':'sac à main',
  'tie':'cravate','suitcase':'valise','briefcase':'cartable',
  /* Cuisine */
  'bottle':'bouteille','wine glass':'verre à vin','cup':'tasse',
  'fork':'fourchette','knife':'couteau','spoon':'cuillère','bowl':'bol',
  'toaster':'grille-pain','microwave':'micro-ondes','oven':'four',
  'refrigerator':'réfrigérateur','sink':'évier','blender':'blender',
  /* Mobilier */
  'chair':'chaise','couch':'canapé','bed':'lit','dining table':'table',
  'toilet':'toilettes','bench':'banc','desk':'bureau','bookshelf':'étagère',
  /* Électronique */
  'tv':'télévision','laptop':'ordinateur portable','mouse':'souris',
  'remote':'télécommande','keyboard':'clavier','cell phone':'smartphone',
  'monitor':'écran PC','tablet':'tablette','speaker':'enceinte',
  'headphones':'casque audio','camera':'appareil photo',
  'printer':'imprimante','router':'routeur wifi',
  /* Objets courants */
  'book':'livre','clock':'horloge','vase':'vase','scissors':'ciseaux',
  'teddy bear':'peluche','hair dryer':'sèche-cheveux',
  'toothbrush':'brosse à dents','mirror':'miroir','lamp':'lampe',
  'candle':'bougie','picture frame':'cadre photo',
  /* Sport */
  'skateboard':'skateboard','sports ball':'ballon',
  'tennis racket':'raquette de tennis','surfboard':'planche de surf',
  'skis':'skis','snowboard':'snowboard','baseball bat':'batte de baseball',
  'baseball glove':'gant de baseball','kite':'cerf-volant',
  'frisbee':'frisbee','golf club':'club de golf',
  'fishing rod':'canne à pêche','helmet':'casque vélo',
  /* Animaux */
  'cat':'chat','dog':'chien','bird':'oiseau','horse':'cheval',
  'sheep':'mouton','cow':'vache','elephant':'éléphant','bear':'ours',
  'zebra':'zèbre','giraffe':'girafe','panda':'panda',
  /* Nourriture (pour fun) */
  'banana':'banane','apple':'pomme','pizza':'pizza','cake':'gâteau',
  'sandwich':'sandwich','orange':'orange','broccoli':'brocoli',
  'carrot':'carotte','hot dog':'hot dog','donut':'donut',
  /* Autre */
  'person':'personne','fire hydrant':'bouche d\'incendie',
  'stop sign':'panneau stop','parking meter':'parcomètre',
  'traffic light':'feu tricolore','bench':'banc',
  'potted plant':'plante en pot','wine glass':'verre à vin',
};

/* Termes de recherche eBay améliorés (plus précis = meilleurs résultats) */
const SEARCH = {
  'cell phone':'smartphone débloqué','tv':'télévision LED',
  'laptop':'ordinateur portable','couch':'canapé salon',
  'mouse':'souris sans fil','sports ball':'ballon football',
  'teddy bear':'peluche jouet enfant','hair dryer':'sèche cheveux',
  'remote':'télécommande universelle',
};

/* ── PLATEFORMES ── */
const PLATS = [
  {nm:'Leboncoin',ic:'🟠',url:q=>`https://www.leboncoin.fr/recherche?text=${q}`},
  {nm:'Backmarket',ic:'⚫',url:q=>`https://www.backmarket.fr/fr-fr/search?q=${q}`},
  {nm:'Fnac',     ic:'🔴',url:q=>`https://www.fnac.com/SearchResult/ResultList.aspx?Search=${q}`},
  {nm:'Rakuten',  ic:'🩷',url:q=>`https://fr.shopping.rakuten.com/search?keyword=${q}`},
  {nm:'Facebook', ic:'🔵',url:q=>`https://www.facebook.com/marketplace/search/?query=${q}`},
  {nm:'Dealabs',  ic:'🔥',url:q=>`https://www.dealabs.com/search?q=${q}`},
  {nm:'Vestiaire',ic:'🟣',url:q=>`https://fr.vestiairecollective.com/search/?q=${q}`},
  {nm:'La Redoute',ic:'🌸',url:q=>`https://www.laredoute.fr/recherche.aspx?text=${q}`},
];

/* ── ÉTAT ── */
let model=null,stream=null,dtimer=null,lastCls=null,busy=false;
let hist=[];
try{hist=JSON.parse(localStorage.getItem('wiw')||'[]')}catch(_){}

const $=id=>document.getElementById(id);
const vid=$('video'),cnv=$('canvas'),ctx=cnv.getContext('2d');
const card=$('pc'),cb=$('cb');

/* ── INIT ── */
async function init(){
  setL(10,'Vérification caméra…');
  if(EBAY_APP_ID==='VOTRE_APP_ID_ICI')$('sb').style.display='block';
  try{
    await openCam();
    setL(40,'Chargement modèle IA…');
    model=await cocoSsd.load({base:'lite_mobilenet_v2'});
    setL(100,'Prêt !');
    await sl(350);
    $('loader').style.display='none';
    toast('✅ Pointe vers un objet — ou tape 🔍 pour chercher');
    startLoop();
  }catch(e){
    console.error(e);
    $('loader').style.display='none';
    $('perm').style.display='flex';
  }
}

async function openCam(){
  stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
  vid.srcObject=stream;
  await new Promise(r=>{vid.onloadedmetadata=r});
  $('perm').style.display='none';
}

async function requestCamera(){$('perm').style.display='none';$('loader').style.display='flex';await init()}
function setL(p,t){$('lbar').style.width=p+'%';$('ltxt').textContent=t}
function startLoop(){dtimer=setInterval(detect,DETECT_MS)}

/* ── DETECTION ── */
async function detect(){
  if(!model||vid.readyState<4||busy)return;
  cnv.width=vid.videoWidth||640;cnv.height=vid.videoHeight||480;
  ctx.clearRect(0,0,cnv.width,cnv.height);
  let preds;try{preds=await model.detect(vid)}catch(_){return}
  const valid=preds.filter(p=>p.score>=MIN_SCORE);
  valid.forEach(drawBox);
  if(!valid.length){hideCard();lastCls=null;return}
  const best=valid.reduce((a,b)=>a.score>b.score?a:b);
  if(best.class===lastCls)return;
  lastCls=best.class;
  const label=FR[best.class]||best.class;
  const searchTerm=SEARCH[best.class]||best.class;
  triggerSearch(searchTerm,label,Math.round(best.score*100),'camera');
}

function drawBox(p){
  const[x,y,w,h]=p.bbox,lbl=(FR[p.class]||p.class).toUpperCase(),cf=Math.round(p.score*100),cs=12;
  ctx.shadowColor='#39ff6e';ctx.shadowBlur=10;ctx.strokeStyle='#39ff6e';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
  ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.shadowBlur=0;
  [[x,y,1,1],[x+w,y,-1,1],[x,y+h,1,-1],[x+w,y+h,-1,-1]].forEach(([cx,cy,dx,dy])=>{
    ctx.beginPath();ctx.moveTo(cx+dx*cs,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+dy*cs);ctx.stroke();
  });
  const tw=ctx.measureText(`${lbl} ${cf}%`).width+16;
  ctx.fillStyle='#39ff6e';
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y-23,tw,19,3);ctx.fill();}
  else ctx.fillRect(x,y-23,tw,19);
  ctx.fillStyle='#000';ctx.font='bold 10px DM Mono,monospace';ctx.fillText(`${lbl} ${cf}%`,x+8,y-10);
}

/* ── MANUAL SEARCH ── */
function openSearch(){
  clearInterval(dtimer);dtimer=null;
  $('search-overlay').classList.add('open');
  setTimeout(()=>$('search-input').focus(),300);
}

function closeSearch(){
  $('search-overlay').classList.remove('open');
  $('search-input').value='';
  lastCls=null;
  if(!dtimer)startLoop();
}

function handleOverlayClick(e){if(e.target===e.currentTarget)closeSearch()}

function doManualSearch(){
  const val=$('search-input').value.trim();
  if(!val)return;
  closeSearch();
  triggerSearch(val,val,100,'manual');
}

$('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doManualSearch()});

/* ── TRIGGER SEARCH ── */
function triggerSearch(searchEn,labelFr,conf,mode){
  cb.innerHTML=`<div class="on">${sD(labelFr)}</div><div class="os">Confiance ${conf}% · Comparaison en cours…</div><div class="ld"><div class="sp"></div>Recherche eBay · Vinted · Amazon…</div>`;
  card.classList.add('up');
  busy=true;
  Promise.allSettled([fetchEbay(searchEn),fetchVinted(searchEn),fetchAmazon(searchEn)])
    .then(([e,v,a])=>{
      busy=false;
      const ebay=e.status==='fulfilled'?e.value:null;
      const vint=v.status==='fulfilled'?v.value:null;
      const amaz=a.status==='fulfilled'?a.value:null;
      render(searchEn,labelFr,conf,ebay,vint,amaz);
      if(ebay?.prices?.length){
        const avg=Math.round(ebay.prices.reduce((x,y)=>x+y,0)/ebay.prices.length);
        saveHist(labelFr,avg);
      }
    });
}

function hideCard(){card.classList.remove('up')}

/* ── EBAY API (JSONP) ── */
function fetchEbay(term){
  return new Promise((resolve,reject)=>{
    const cb2='_eb'+Date.now(),sc=document.createElement('script');
    let done=false;
    const t=setTimeout(()=>{if(done)return;done=true;delete window[cb2];sc.remove();reject(new Error('timeout'))},8000);
    window[cb2]=data=>{
      clearTimeout(t);done=true;delete window[cb2];sc.remove();
      try{
        const items=data?.findCompletedItemsResponse?.[0]?.searchResult?.[0]?.item??[];
        const prices=items.map(i=>parseFloat(i?.sellingStatus?.[0]?.convertedCurrentPrice?.[0]?.__value__??0)).filter(p=>p>0).sort((a,b)=>a-b);
        const listings=items.slice(0,5).map(i=>({title:i?.title?.[0]??'',price:parseFloat(i?.sellingStatus?.[0]?.convertedCurrentPrice?.[0]?.__value__??0)})).filter(l=>l.price>0);
        resolve({prices,listings});
      }catch(e){reject(e)}
    };
    const q=new URLSearchParams({'OPERATION-NAME':'findCompletedItems','GLOBAL-ID':EBAY_GLOBAL,'SERVICE-VERSION':'1.0.0','SECURITY-APPNAME':EBAY_APP_ID,'RESPONSE-DATA-FORMAT':'JSON','callback':cb2,'keywords':sP(term),'itemFilter(0).name':'SoldItemsOnly','itemFilter(0).value':'true','sortOrder':'EndTimeSoonest','paginationInput.entriesPerPage':'20','outputSelector':'SellingStatus'});
    sc.src=`https://svcs.ebay.com/services/search/FindingService/v1?${q}`;
    sc.onerror=()=>{clearTimeout(t);done=true;delete window[cb2];sc.remove();reject(new Error('net'))};
    document.head.appendChild(sc);
  });
}

/* ── VINTED (proxy) ── */
async function fetchVinted(term){
  const url=`https://www.vinted.fr/api/v2/catalog/items?search_text=${encodeURIComponent(term)}&per_page=30&order=relevance`;
  const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(7000)});
  if(!r.ok)throw new Error('v');
  const j=await r.json();
  const d=JSON.parse(j.contents);
  const items=d?.items??[];
  if(!items.length)return null;
  const prices=items.map(i=>parseFloat(i?.price??0)).filter(p=>p>0).sort((a,b)=>a-b);
  return{prices,count:items.length};
}

/* ── AMAZON (proxy + regex) ── */
async function fetchAmazon(term){
  const url=`https://www.amazon.fr/s?k=${encodeURIComponent(term)}&ref=nb_sb_noss`;
  const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(9000)});
  if(!r.ok)throw new Error('a');
  const j=await r.json();
  const html=j.contents;
  /* Extraire les prix du HTML Amazon */
  const prices=[];
  const re=/(\d[\d\s]*)[\.,](\d{2})\s*(?:€|EUR)/g;
  let m;
  while((m=re.exec(html))!==null){
    const p=parseFloat(m[1].replace(/[\s\u00a0]/g,'')+'.'+m[2]);
    if(p>0.5&&p<50000)prices.push(p);
  }
  if(!prices.length)return null;
  prices.sort((a,b)=>a-b);
  /* Enlever outliers extrêmes (10% de chaque côté) */
  const cut=Math.max(1,Math.floor(prices.length*0.1));
  const clean=prices.length>4?prices.slice(cut,prices.length-cut):prices;
  return clean.length?{prices:clean}:null;
}

/* ── RENDER ── */

    const mn=ebay.prices[0],mx=ebay.prices[ebay.prices.length-1],av=Math.round(ebay.prices.reduce((a,b)=>a+b,0)/ebay.prices.length);
    ebHTML=`<div class="sb2">🟠 eBay — ventes conclues</div>
    <div class="pg">
      <div class="pb"><div class="pl">Min</div><div class="pv w">${mn.toFixed(0)} €</div></div>
      <div class="pb"><div class="pl">Moyen</div><div class="pv g">${av} €</div></div>
      <div class="pb"><div class="pl">Max</div><div class="pv b">${mx.toFixed(0)} €</div></div>
    </div>
    <div class="lsts">${ebay.listings.map(l=>`<div class="lst"><span class="ltl">${sD(l.title)}</span><span class="lpr green">${l.price.toFixed(0)} €</span></div>`).join('')}</div>
    <a class="cta" href="https://www.ebay.fr/sch/i.html?_nkw=${q}&LH_Complete=1&LH_Sold=1" target="_blank" rel="noopener noreferrer">Voir toutes les ventes eBay →</a>`;
  }else{
    ebHTML=`<p class="nr">Aucune vente eBay récente. <a href="https://www.ebay.fr/sch/i.html?_nkw=${q}" target="_blank" style="color:var(--a2)">Chercher quand même →</a></p>`;
  }

  /* Vinted */
  let vtHTML='';
  if(vint?.prices?.length){
    const mn=vint.prices[0],mx=vint.prices[vint.prices.length-1],av=Math.round(vint.prices.reduce((a,b)=>a+b,0)/vint.prices.length);
    vtHTML=`<div class="vb">
      <div class="vh"><span style="font-size:15px">🟢</span><span class="vn">Vinted — annonces actives</span><span class="vc">${vint.count} articles</span></div>
      <div class="vg">
        <div class="vx"><div class="vxl">Min</div><div class="vxv vw">${mn.toFixed(0)} €</div></div>
        <div class="vx"><div class="vxl">Moyen</div><div class="vxv">${av} €</div></div>
        <div class="vx"><div class="vxl">Max</div><div class="vxv vb2">${mx.toFixed(0)} €</div></div>
      </div>
    </div>`;
  }

  /* Amazon */
  let amHTML='';
  if(amaz?.prices?.length){
    const mn=amaz.prices[0],mx=amaz.prices[amaz.prices.length-1],av=Math.round(amaz.prices.reduce((a,b)=>a+b,0)/amaz.prices.length);
    amHTML=`<div class="amb">
      <div class="amh"><span style="font-size:15px">🟡</span><span class="amn">Amazon — prix actuels</span><span class="amc">${amaz.prices.length} résultats</span></div>
      <div class="amg">
        <div class="amx"><div class="amxl">Min</div><div class="amxv amw">${mn.toFixed(0)} €</div></div>
        <div class="amx"><div class="amxl">Moyen</div><div class="amxv">${av} €</div></div>
        <div class="amx"><div class="amxl">Max</div><div class="amxv amb2">${mx.toFixed(0)} €</div></div>
      </div>
    </div>`;
  }

  /* Liens plateformes */
  const plHTML=PLATS.map(p=>`<a class="plt" href="${p.url(qF)}" target="_blank" rel="noopener noreferrer"><span class="ic">${p.ic}</span><span class="nm">${p.nm}</span></a>`).join('');

  cb.innerHTML=`
    <div class="on">${sD(labelFr)}</div>
    <div class="os">Confiance ${conf}%</div>
    ${ebHTML}${vtHTML}${amHTML}
    <div class="stl">Comparer sur d'autres plateformes</div>
    <div class="plts">${plHTML}</div>
  `;
}

/* ── HISTORY ── */
function saveHist(name,avg){hist.unshift({name,avg,date:new Date().toLocaleDateString('fr-FR')});if(hist.length>60)hist.length=60;try{localStorage.setItem('wiw',JSON.stringify(hist))}catch(_){}}

function openHistory(){
  clearInterval(dtimer);dtimer=null;hideCard();
  $('hpl').innerHTML=!hist.length?'<div class="he">📭 Aucun scan.<br>Pointe vers un objet ou cherche manuellement !</div>':hist.map(h=>`<div class="hi"><div><div class="hn">${sD(h.name)}</div><div class="hd2">${h.date}</div></div><div class="ha">~${h.avg} €</div></div>`).join('');
  $('hp').classList.add('open');
}

function closeHistory(){$('hp').classList.remove('open');lastCls=null;if(!dtimer)startLoop()}

/* ── TOAST ── */
function toast(msg,dur=2800){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}

/* ── UTILS ── */
function sP(s){return String(s).replace(/[<>"'&;]/g,'').substring(0,80).trim()}
function sD(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').substring(0,120)}
function sl(ms){return new Promise(r=>setTimeout(r,ms))}

/* Prevent double-tap zoom */
let lt=0;
document.addEventListener('touchend',e=>{const n=Date.now();if(n-lt<300)e.preventDefault();lt=n},{passive:false});

window.addEventListener('load',init);
</script>
