<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>WhatIsItWorth</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
:root{
  --a:#39ff6e;--a2:#00c8ff;--am:#ff9900;--vt:#09b687;
  --bg:#0a0a0f;--sf:rgba(12,12,20,0.96);--br:rgba(255,255,255,0.08);
  --tx:#f0f0f0;--mu:#555;--re:#ff4545;
  --fn:system-ui,-apple-system,sans-serif;--hd:'Space Grotesk',sans-serif
}
body{background:var(--bg);color:var(--tx);font-family:var(--fn)}
.screen{position:fixed;inset:0;display:none;flex-direction:column}
.screen.active{display:flex}

/* LOADER */
#s-loader{background:var(--bg);align-items:center;justify-content:center;gap:18px}
.logo-big{font-family:var(--hd);font-size:clamp(24px,7vw,36px);font-weight:800;letter-spacing:-1px}
.logo-big em{color:var(--a);font-style:normal}
.lbar-w{width:200px;height:2px;background:var(--br);border-radius:2px;overflow:hidden}
.lbar{height:100%;width:0%;background:linear-gradient(90deg,var(--a),var(--a2));transition:width .4s ease}
.ltxt{font-size:11px;color:var(--mu);letter-spacing:1px;text-transform:uppercase}

/* CAMERA */
#s-camera{background:#000}
#video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.cam-ui{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between}
.cam-top{padding:env(safe-area-inset-top,44px) 18px 18px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);display:flex;justify-content:space-between;align-items:center}
.logo-sm{font-family:var(--hd);font-size:16px;font-weight:800;letter-spacing:-.5px}
.logo-sm em{color:var(--a);font-style:normal}
.ico-btn{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);border:1px solid var(--br);color:var(--tx);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.ico-btn:active{transform:scale(.88)}
/* Viewfinder */
.vf-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:230px;height:230px;pointer-events:none}
.vf-corner{position:absolute;width:26px;height:26px;border-color:rgba(255,255,255,.75);border-style:solid}
.vf-corner.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:5px 0 0 0}
.vf-corner.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 5px 0 0}
.vf-corner.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 5px}
.vf-corner.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 5px 0}
.vf-label{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;letter-spacing:.3px}
.cam-bottom{padding:16px 18px env(safe-area-inset-bottom,30px);background:linear-gradient(to top,rgba(0,0,0,.7),transparent);display:flex;flex-direction:column;align-items:center;gap:14px}
.search-bar{display:flex;gap:8px;width:100%;max-width:380px}
.search-input{flex:1;background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);border-radius:13px;padding:11px 14px;color:#fff;font-size:14px;outline:none}
.search-input::placeholder{color:rgba(255,255,255,.4)}
.search-input:focus{border-color:var(--a)}
.search-go{background:var(--a);color:#000;border:none;border-radius:13px;padding:11px 18px;font-size:15px;cursor:pointer;transition:opacity .2s}
.search-go:active{opacity:.8}
.shutter-wrap{display:flex;align-items:center;gap:24px}
.shutter{width:74px;height:74px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;box-shadow:0 0 0 7px rgba(255,255,255,.1)}
.shutter:active{transform:scale(.9)}
.shutter-ring{width:56px;height:56px;border-radius:50%;background:#fff;border:2px solid #ccc}

/* ANALYZING */
#s-analyze{background:var(--bg);align-items:center;justify-content:center;gap:22px;padding:30px;text-align:center}
.analyze-img{width:160px;height:160px;border-radius:20px;object-fit:cover;border:2px solid var(--br);display:block}
.analyze-img.hidden{display:none}
.analyze-title{font-family:var(--hd);font-size:21px;font-weight:800}
.steps{display:flex;flex-direction:column;gap:10px;width:100%;max-width:260px;text-align:left}
.step{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--mu);transition:color .3s}
.step.active{color:var(--tx)}
.step.done{color:var(--mu)}
.step-dot{width:26px;height:26px;border-radius:50%;border:1px solid var(--br);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:border-color .3s}
.step.active .step-dot{border-color:var(--a);box-shadow:0 0 0 3px rgba(57,255,110,.15)}
.step.done .step-dot{background:rgba(57,255,110,.1);border-color:rgba(57,255,110,.3)}

/* RESULTS */
#s-results{background:var(--bg)}
.res-top{padding:env(safe-area-inset-top,44px) 16px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.btn-back{background:rgba(255,255,255,.06);border:1px solid var(--br);border-radius:10px;padding:9px 15px;font-size:13px;cursor:pointer;color:var(--tx);transition:opacity .2s}
.btn-back:active{opacity:.7}
.res-body{flex:1;overflow-y:auto;padding:14px 16px env(safe-area-inset-bottom,20px);scrollbar-width:none}
.res-body::-webkit-scrollbar{display:none}
.obj-row{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.obj-thumb{width:68px;height:68px;border-radius:12px;object-fit:cover;border:1px solid var(--br);flex-shrink:0}
.obj-thumb-ph{width:68px;height:68px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--br);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.obj-name{font-family:var(--hd);font-size:22px;font-weight:800;line-height:1.1;margin-bottom:5px}
.obj-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--mu);background:rgba(255,255,255,.04);border:1px solid var(--br);border-radius:5px;padding:3px 8px}
/* Price block */
.pblock{border-radius:13px;padding:14px;margin-bottom:10px}
.pblock-ebay{background:rgba(229,113,32,.07);border:1px solid rgba(229,113,32,.2)}
.pblock-vinted{background:rgba(9,182,135,.07);border:1px solid rgba(9,182,135,.2)}
.pblock-amazon{background:rgba(255,153,0,.07);border:1px solid rgba(255,153,0,.2)}
.pbh{display:flex;align-items:center;gap:7px;margin-bottom:11px}
.pbi{font-size:15px}.pbn{font-size:12px;font-weight:600}
.pbn.ec{color:#e57120}.pbn.vc{color:var(--vt)}.pbn.ac{color:var(--am)}
.pbc{font-size:10px;color:var(--mu);margin-left:auto}
.pg3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pg3-box{text-align:center}
.pg3-l{font-size:9px;color:var(--mu);letter-spacing:.7px;text-transform:uppercase;margin-bottom:3px}
.pg3-v{font-size:17px;font-weight:600}
.pg3-v.wh{color:var(--tx)}.pg3-v.gr{color:var(--a)}.pg3-v.bl{color:var(--a2)}.pg3-v.or{color:var(--am)}.pg3-v.vg{color:var(--vt)}
.listings{margin-top:10px;border-top:1px solid rgba(255,255,255,.05);padding-top:8px}
.lst-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);gap:8px}
.lst-row:last-child{border-bottom:none}
.lst-t{font-size:11px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.lst-p{font-size:11px;font-weight:600;white-space:nowrap}
.cta-btn{display:block;width:100%;background:linear-gradient(135deg,var(--a),var(--a2));color:#000;text-align:center;padding:12px;border-radius:11px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;margin-top:10px;transition:opacity .2s}
.cta-btn:active{opacity:.85}
.no-data{font-size:12px;color:var(--mu);padding:6px 0;line-height:1.5}
.no-data a{color:var(--a2)}
.sec-title{font-size:10px;color:var(--mu);letter-spacing:.7px;text-transform:uppercase;margin:14px 0 9px}
.plts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.plt{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:11px;padding:10px 3px;text-decoration:none;color:var(--tx);text-align:center;transition:transform .15s}
.plt:active{transform:scale(.93)}
.plt-ic{font-size:20px}.plt-nm{font-size:9px;color:var(--mu)}

/* HISTORY */
#s-history{background:var(--bg)}
.hist-top{padding:env(safe-area-inset-top,44px) 16px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0}
.hist-title{font-family:var(--hd);font-size:21px;font-weight:800}
.hist-acts{display:flex;gap:8px}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid var(--br);border-radius:9px;padding:8px 13px;font-size:12px;cursor:pointer;color:var(--tx)}
.btn-sm.red{color:var(--re);border-color:rgba(255,69,69,.2)}
.btn-sm:active{opacity:.7}
.hist-list{flex:1;overflow-y:auto;padding:0 16px env(safe-area-inset-bottom,16px);scrollbar-width:none}
.hist-list::-webkit-scrollbar{display:none}
.h-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:12px;margin-bottom:8px}
.h-thumb{width:50px;height:50px;border-radius:9px;object-fit:cover;border:1px solid var(--br);flex-shrink:0}
.h-thumb-ph{width:50px;height:50px;border-radius:9px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid var(--br)}
.h-info{flex:1;min-width:0}
.h-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.h-date{font-size:10px;color:var(--mu)}
.h-price{font-size:17px;font-weight:600;color:var(--a);white-space:nowrap}
.hist-empty{text-align:center;color:var(--mu);font-size:13px;margin-top:60px;line-height:2.2}

/* LAST SALE */
.last-sale{display:block;background:linear-gradient(135deg,rgba(57,255,110,.1),rgba(0,200,255,.08));border:1px solid rgba(57,255,110,.3);border-radius:16px;padding:16px;margin-bottom:12px;text-decoration:none;color:var(--tx);transition:opacity .2s}
.last-sale:active{opacity:.8}
.last-sale-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.last-sale-badge{background:var(--re);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.5px;animation:pulse-red 1.5s ease-in-out infinite}
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.6}}
.last-sale-when{font-size:11px;color:var(--mu);letter-spacing:.3px}
.last-sale-price{font-family:var(--hd);font-size:36px;font-weight:800;color:var(--a);letter-spacing:-1px;line-height:1;margin-bottom:6px}
.last-sale-title{font-size:12px;color:rgba(255,255,255,.5);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}


.refresh-bar{height:2px;background:var(--br);position:relative;overflow:hidden;flex-shrink:0}
.refresh-bar-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--a),var(--a2));transition:width 1s linear}
.refresh-row{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 0;flex-shrink:0}
.refresh-label{font-size:10px;color:var(--mu)}
.refresh-btn{background:rgba(57,255,110,.1);border:1px solid rgba(57,255,110,.2);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--a);cursor:pointer;font-family:var(--fn)}
.refresh-btn:active{opacity:.7}
#toast{position:fixed;bottom:env(safe-area-inset-bottom,24px);left:50%;transform:translateX(-50%) translateY(6px);background:rgba(15,15,25,.97);border:1px solid var(--br);backdrop-filter:blur(16px);border-radius:10px;padding:10px 18px;font-size:12px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

      <button class="btn-sm" onclick="goCamera()">✕</button>

<!-- TensorFlow.js + MobileNet (1000 catégories, tourne en local) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>

<script>
/* ═══════════════════════════════════════════
   CONFIG — Uniquement la clé eBay (lecture seule)
   GitHub ne détecte pas ce format comme secret.
═══════════════════════════════════════════ */
const EBAY_KEY    = 'LucasWep-MoodMeal-PRD-96c21b7a2-16c4f33b';
const EBAY_GLOBAL = 'EBAY-FR';

/* ═══════════════════════════════════════════
   PLATEFORMES
═══════════════════════════════════════════ */
const PLATS = [
  {nm:'Leboncoin', ic:'🟠', url:q=>`https://www.leboncoin.fr/recherche?text=${q}`},
  {nm:'Backmarket',ic:'⚫', url:q=>`https://www.backmarket.fr/fr-fr/search?q=${q}`},
  {nm:'Fnac',      ic:'🔴', url:q=>`https://www.fnac.com/SearchResult/ResultList.aspx?Search=${q}`},
  {nm:'Rakuten',   ic:'🩷', url:q=>`https://fr.shopping.rakuten.com/search?keyword=${q}`},
  {nm:'Facebook',  ic:'🔵', url:q=>`https://www.facebook.com/marketplace/search/?query=${q}`},
  {nm:'Dealabs',   ic:'🔥', url:q=>`https://www.dealabs.com/search?q=${q}`},
  {nm:'Vestiaire', ic:'🟣', url:q=>`https://fr.vestiairecollective.com/search/?q=${q}`},
  {nm:'La Redoute',ic:'🌸', url:q=>`https://www.laredoute.fr/recherche.aspx?text=${q}`},
];

/* ═══════════════════════════════════════════
   TRADUCTIONS MobileNet → Français
═══════════════════════════════════════════ */
const TRANSLATE = {
  'notebook':'ordinateur portable','laptop':'ordinateur portable',
  'desktop computer':'ordinateur de bureau','monitor':'écran PC',
  'cellular telephone':'smartphone','mobile phone':'smartphone',
  'television':'télévision','television set':'télévision',
  'remote control':'télécommande','computer keyboard':'clavier',
  'computer mouse':'souris','mouse':'souris',
  'headphone':'casque audio','earphone':'écouteurs',
  'loudspeaker':'enceinte','speaker':'enceinte',
  'camera':'appareil photo','digital camera':'appareil photo',
  'reflex camera':'appareil photo reflex',
  'bicycle':'vélo','mountain bike':'vélo VTT','road bike':'vélo de route',
  'motorcycle':'moto','moped':'scooter','motor scooter':'scooter',

  'analog clock':'horloge','wall clock':'horloge murale',
  'wristwatch':'montre','digital watch':'montre connectée',
  'book':'livre','bookcase':'bibliothèque',
  'acoustic guitar':'guitare acoustique','electric guitar':'guitare électrique',

};

function toFr(enName) {
  const low = enName.toLowerCase();
  for (const [key, val] of Object.entries(TRANSLATE)) {
    if (low.includes(key)) return val;
  }
  // Nettoyage basique : enlever synonymes après virgule, capitaliser
  const clean = enName.split(',')[0].trim();
  return clean.charAt(0).toUpperCase() + clean.slice(1);
}

/* ═══════════════════════════════════════════
   ÉTAT
═══════════════════════════════════════════ */
let mnModel    = null;
let videoStream= null;

let refreshTimer = null;
let refreshInterval = 30; // secondes
try { history = JSON.parse(localStorage.getItem('wiw') || '[]'); } catch(_) {}

const $    = id => document.getElementById(id);
const SCRN = ['s-loader','s-camera','s-analyze','s-results','s-history'];

function show(id) {
  SCRN.forEach(s => {
    const el = $(s);
    el.classList.toggle('active', s === id);
    el.style.display = '';
  });
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
async function init() {
  setL(10, 'Accès caméra…');
  try {
    await openCam();
  } catch(e) {
    toast('⚠️ Autorise la caméra et recharge la page');
  }

  setL(40, 'Chargement du modèle IA…');
  try {
    mnModel = await mobilenet.load({ version: 2, alpha: 1.0 });
  } catch(e) {
    console.error('MobileNet error', e);
    toast('⚠️ Erreur chargement IA — vérifie ta connexion');
  }

  setL(100, 'Prêt !');
  await sleep(300);
  show('s-camera');
  toast('📷 Cadre l\'objet et appuie sur le bouton blanc');
}

async function openCam() {
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  videoStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
  });
  $('video').srcObject = videoStream;
  await new Promise(r => { $('video').onloadedmetadata = r; });
}

function setL(p, t) { $('lbar').style.width = p + '%'; $('ltxt').textContent = t; }

/* ═══════════════════════════════════════════
   CAPTURE PHOTO
═══════════════════════════════════════════ */
function capturePhoto() {
  const vid = $('video');
  const cnv = $('snap-cnv');
  cnv.width  = vid.videoWidth  || 1280;
  cnv.height = vid.videoHeight || 720;
  cnv.getContext('2d').drawImage(vid, 0, 0);

  const previewUrl = cnv.toDataURL('image/jpeg', 0.6);
  const analyzeImg = $('analyze-img');
  analyzeImg.src = previewUrl;
  analyzeImg.classList.remove('hidden');

  show('s-analyze');
  resetSteps();
  analyzePhoto(cnv, previewUrl);
}

/* ═══════════════════════════════════════════
   ANALYSE IA (MobileNet — local, zéro clé)
═══════════════════════════════════════════ */
async function analyzePhoto(canvas, previewUrl) {
  setStep(1, 'active');

  let nameFr = 'objet', searchEn = 'item';

  try {
    if (!mnModel) throw new Error('model not loaded');

    // Créer un élément image à partir du canvas
    const img = new Image();
    img.src = canvas.toDataURL('image/jpeg', 0.9);
    await new Promise(r => { img.onload = r; });

    const preds = await mnModel.classify(img, 3);
    if (preds && preds.length > 0) {
      // Meilleure prédiction
      searchEn = preds[0].className.split(',')[0].trim();
      nameFr   = toFr(preds[0].className);
      $('analyze-title').textContent = nameFr;
    }
  } catch(e) {
    console.error('AI error:', e);
    toast('IA non disponible — utilise la barre de recherche');
    show('s-camera');
    return;
  }

  setStep(1, 'done');
  await runPriceSearch(nameFr, searchEn, previewUrl);
}

/* ═══════════════════════════════════════════
   RECHERCHE MANUELLE
═══════════════════════════════════════════ */
function doManualSearch() {
  const val = $('search-input').value.trim();
  if (!val) return;
  $('search-input').value = '';
  $('analyze-img').classList.add('hidden');
  $('analyze-title').textContent = 'Recherche en cours…';
  show('s-analyze');
  resetSteps();
  setStep(1, 'done');
  runPriceSearch(val, val, null);
}

$('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doManualSearch(); });

/* ═══════════════════════════════════════════
   RECHERCHE PRIX
═══════════════════════════════════════════ */
async function runPriceSearch(nameFr, searchEn, previewUrl, isRefresh = false) {
  // Sauvegarder pour le refresh
  lastSearch = { nameFr, searchEn, previewUrl };

  if (!isRefresh) {
    setStep(2, 'active');
  }

  const [ebayR, vintedR, amazonR] = await Promise.allSettled([
    fetchEbayDeep(searchEn),
    fetchVinted(nameFr),
    fetchAmazon(searchEn),
  ]);

  if (!isRefresh) {
    setStep(2, 'done'); setStep(3, 'done'); setStep(4, 'done');
  }

  const ebay   = ebayR.status   === 'fulfilled' ? ebayR.value   : null;
  const vinted = vintedR.status === 'fulfilled' ? vintedR.value : null;
  const amazon = amazonR.status === 'fulfilled' ? amazonR.value : null;

  const avgEbay = ebay?.prices?.length
    ? Math.round(ebay.prices.reduce((a,b)=>a+b,0)/ebay.prices.length) : 0;

  if (!isRefresh) saveHistory(nameFr, avgEbay, previewUrl);

  renderResults(nameFr, searchEn, ebay, vinted, amazon, previewUrl);

  if (!isRefresh) {
    await sleep(200);
    show('s-results');
  }

  startRefreshTimer();
}

/* ═══════════════════════════════════════════
   EBAY — RECHERCHE APPROFONDIE MULTI-STRATÉGIE
   1. eBay France exact
   2. eBay France termes larges
   3. eBay international (plus de résultats)
═══════════════════════════════════════════ */
async function fetchEbayDeep(term) {
  const r1 = await fetchEbay(term, 'EBAY-FR');
  if (r1?.last?.price > 0) return r1;
  const broad = term.split(' ').slice(0, 2).join(' ');
  if (broad !== term) {
    const r2 = await fetchEbay(broad, 'EBAY-FR');
    if (r2?.last?.price > 0) return r2;
  }
  const r3 = await fetchEbay(term, 'EBAY-ENCA');
  if (r3?.last?.price > 0) return r3;
  if (broad !== term) {
    return await fetchEbay(broad, 'EBAY-ENCA');
  }
  return r3;
}

/* ═══════════════════════════════════════════
   EBAY API (JSONP)
═══════════════════════════════════════════ */
function fetchEbay(term, globalId = 'EBAY-FR') {
  return new Promise((resolve, reject) => {
    const cb = '_eb' + Date.now();
    const sc = document.createElement('script');
    let done = false;
    const timer = setTimeout(() => {
      if (done) return; done = true; delete window[cb]; sc.remove(); resolve(null);
    }, 8000);

    window[cb] = data => {
      clearTimeout(timer); done = true; delete window[cb]; sc.remove();
      try {
        const items = data?.findCompletedItemsResponse?.[0]?.searchResult?.[0]?.item ?? [];
        const prices = items
          .map(i => parseFloat(i?.sellingStatus?.[0]?.convertedCurrentPrice?.[0]?.__value__ ?? 0))
          .filter(p => p > 0).sort((a,b) => a - b);
        const listings = items.slice(0, 5).map(i => ({
          title: i?.title?.[0] ?? '',
          price: parseFloat(i?.sellingStatus?.[0]?.convertedCurrentPrice?.[0]?.__value__ ?? 0)
        })).filter(l => l.price > 0);
        const last = items[0] ? {
          title  : items[0]?.title?.[0] ?? '',
          price  : parseFloat(items[0]?.sellingStatus?.[0]?.convertedCurrentPrice?.[0]?.__value__ ?? 0),
          time   : items[0]?.listingInfo?.[0]?.endTime?.[0] ?? null,
          url    : items[0]?.viewItemURL?.[0] ?? null,
          global : globalId !== 'EBAY-FR',
        } : null;
        resolve({ prices, listings, last });
      } catch(e) { resolve(null); }
    };

    const params = new URLSearchParams({
      'OPERATION-NAME': 'findCompletedItems',
      'GLOBAL-ID': globalId,
      'SERVICE-VERSION': '1.0.0',
      'SECURITY-APPNAME': EBAY_KEY,
      'RESPONSE-DATA-FORMAT': 'JSON',
      'callback': cb,
      'keywords': sP(term),
      'itemFilter(0).name': 'SoldItemsOnly',
      'itemFilter(0).value': 'true',
      'sortOrder': 'EndTimeSoonest',
      'paginationInput.entriesPerPage': '20',
      'outputSelector(0)': 'SellingStatus',
      'outputSelector(1)': 'ListingInfo',
    });
    sc.src = `https://svcs.ebay.com/services/search/FindingService/v1?${params}`;
    sc.onerror = () => { clearTimeout(timer); done=true; delete window[cb]; sc.remove(); resolve(null); };
    document.head.appendChild(sc);
  });
}

/* ═══════════════════════════════════════════
   VINTED (proxy public)
═══════════════════════════════════════════ */
async function fetchVinted(term) {
  const url = `https://www.vinted.fr/api/v2/catalog/items?search_text=${encodeURIComponent(term)}&per_page=30&order=relevance`;
  const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(8000) });
  if (!r.ok) throw new Error('v');
  const j = await r.json();
  const d = JSON.parse(j.contents);
  const items = d?.items ?? [];
  if (!items.length) return null;
  const prices = items.map(i => parseFloat(i?.price ?? 0)).filter(p => p > 0).sort((a,b) => a-b);
  return { prices, count: items.length };
}

/* ═══════════════════════════════════════════
   AMAZON (proxy + regex)
═══════════════════════════════════════════ */
async function fetchAmazon(term) {
  const url = `https://www.amazon.fr/s?k=${encodeURIComponent(term)}`;
  const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error('a');
  const html = (await r.json()).contents;
  const prices = [];
  const re = /(\d[\d\s]*)[\.,](\d{2})\s*(?:€|EUR)/g;
  let m;
  while ((m = re.exec(html)) !== null) {
    const p = parseFloat(m[1].replace(/[\s\u00a0]/g,'') + '.' + m[2]);
    if (p > 0.5 && p < 50000) prices.push(p);
  }
  if (!prices.length) return null;
  prices.sort((a,b) => a-b);
  const cut = Math.max(1, Math.floor(prices.length * 0.1));
  const clean = prices.length > 4 ? prices.slice(cut, prices.length - cut) : prices;
  return clean.length ? { prices: clean } : null;
}

/* ═══════════════════════════════════════════
   TEMPS ÉCOULÉ
═══════════════════════════════════════════ */
function timeAgo(dateStr) {
  if (!dateStr) return null;
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(mins  / 60);
  const days  = Math.floor(hours / 24);
  if (days  > 0) return `il y a ${days} jour${days  > 1 ? 's' : ''}`;
  if (hours > 0) return `il y a ${hours}h`;
  if (mins  > 0) return `il y a ${mins} min`;
  return 'à l\'instant';
}

/* ═══════════════════════════════════════════
   HISTORIQUE
═══════════════════════════════════════════ */
function saveHistory(name, avg, photo) {
  history.unshift({
    name, avg, photo: photo || null,
    date: new Date().toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' })
  });
  if (history.length > 80) history.length = 80;
  try {
    localStorage.setItem('wiw', JSON.stringify(history));
  } catch(e) {
    // Si trop lourd (photos), sauvegarder sans photos
    const lite = history.map(h => ({...h, photo:null}));
    try { localStorage.setItem('wiw', JSON.stringify(lite)); } catch(_) {}
  }
}

function showHistory() {
  const list = $('hist-list');
  if (!history.length) {
    list.innerHTML = '<div class="hist-empty">📭 Aucun scan pour l\'instant.<br>Prends une photo d\'un objet !</div>';
  } else {
    list.innerHTML = history.map(h => `
      <div class="h-item">
        ${h.photo
          ? `<img class="h-thumb" src="${h.photo}" alt="" onerror="this.style.display='none'">`
          : `<div class="h-thumb-ph">📦</div>`}
        <div class="h-info">
          <div class="h-name">${sD(h.name)}</div>
          <div class="h-date">${h.date}</div>
        </div>
        ${h.avg ? `<div class="h-price">~${h.avg} €</div>` : ''}
      </div>`
    ).join('');
  }
  show('s-history');
}

function clearHistory() {
  if (!confirm('Effacer tout l\'historique ?')) return;
  history = [];
  try { localStorage.removeItem('wiw'); } catch(_) {}
  showHistory();
  toast('Historique effacé');
}

/* ═══════════════════════════════════════════
   NAVIGATION + UTILITAIRES
═══════════════════════════════════════════ */
function goCamera() {
  stopRefreshTimer();
  show('s-camera');
  if (!videoStream) openCam();
}

function resetSteps() {
  [1,2,3,4].forEach(i => {
    $('step'+i).classList.remove('active','done');
  });
  $('step1').classList.add('active');
}

function setStep(n, state) {
  [1,2,3,4].forEach(i => {
    const el = $('step'+i);
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add(state);
  });
}

function toast(msg, dur=2800) {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function sP(s) { return String(s).replace(/[<>"'&;]/g,'').substring(0,100).trim(); }
function sD(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').substring(0,150); }
function sleep(ms) { return new Promise(r => setTimeout(r,ms)); }

let lt = 0;
document.addEventListener('touchend', e => {
  const n = Date.now();
  if (n - lt < 300) e.preventDefault();
  lt = n;
}, { passive: false });

window.addEventListener('load', init);
</script>
